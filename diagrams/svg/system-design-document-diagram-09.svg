<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420"><rect width="900" height="420" fill="#fff"/><rect x="30" y="30" width="840" height="360" rx="18" fill="#f5f8fa" stroke="#263238" stroke-width="3"/><text x="60" y="85" font-family="Arial" font-size="30" font-weight="700" fill="#263238">Diagram 09 - Data Flow Across Storage Paths</text><text x="60" y="135" font-family="Arial" font-size="18" fill="#455a64">OS disk holds system/config. /data holds Harbor, Docker, containerd, and image transfer state.</text><rect x="150" y="200" width="230" height="70" rx="12" fill="#ffebee" stroke="#607d8b"/><text x="190" y="242" font-family="Arial" font-size="17">64 GB OS Disk</text><rect x="510" y="200" width="230" height="70" rx="12" fill="#e3f2fd" stroke="#607d8b"/><text x="555" y="242" font-family="Arial" font-size="17">500 GB /data</text><text x="60" y="340" font-family="Arial" font-size="15" fill="#455a64">Source: diagrams/mermaid-source/system-design-document-diagram-09.mmd</text></svg>