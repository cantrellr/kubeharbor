name: Render Mermaid Diagrams

on:
  push:
    paths:
      - "docs/**/*.md"
      - "diagrams/mermaid-source/**/*.mmd"
      - "diagrams/render-mermaid-assets.sh"
      - "diagrams/sync-mermaid-markdown.py"
      - ".github/workflows/render-mermaid-diagrams.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Mermaid CLI and PNG optimizer dependency
        run: |
          npm install --global @mermaid-js/mermaid-cli
          python3 -m pip install --user pillow

      - name: Render Mermaid SVG and PNG exports
        run: |
          diagrams/render-mermaid-assets.sh "${GITHUB_WORKSPACE}"
          python3 diagrams/sync-mermaid-markdown.py "${GITHUB_WORKSPACE}"

      - name: Commit rendered exports
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Render Mermaid diagram exports
          file_pattern: diagrams/svg diagrams/png diagrams/DIAGRAM-INDEX.md diagrams/DIAGRAM-INDEX.json diagrams/DIAGRAM-SYNC-REPORT.md docs/System-Design-Document.md
